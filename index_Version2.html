<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=https://linkly.link/2DKDf">
  <title>Car & Camp - דף מעבר</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #222 url('bg-car.jpg') center center / cover no-repeat;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .banner {
      margin-top: 30px;
      margin-bottom: 30px;
      max-width: 500px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      overflow: hidden;
      border: 2px solid #ffae23;
      background: rgba(30,30,30,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }
    .redirect-message {
      background: rgba(40,40,40,0.7);
      padding: 24px 32px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.2em;
      box-shadow: 0 2px 16px rgba(0,0,0,0.2);
      max-width: 400px;
    }
    .redirect-link {
      display: inline-block;
      background: #ffae23;
      color: #222;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 30px;
      font-size: 1.2em;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.2s, color 0.2s;
      margin-bottom: 8px;
    }
    .redirect-link:hover {
      background: #fff;
      color: #ffae23;
    }
    @media (max-width: 600px) {
      .banner, .redirect-message {
        max-width: 95vw;
        padding: 12px;
      }
      .redirect-link {
        font-size: 1em;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="banner">
    <img src="banner.png" alt="Car & Camp Banner">
  </div>
  <div class="redirect-message">
    <div>עוד רגע תועברו לקבוצת <b>Car & Camp</b>!</div>
    <div>אם לא הועברתם אוטומטית, לחצו על הכפתור:</div>
  </div>
  <a class="redirect-link" href="https://linkly.link/2DKDf" target="_blank">מעבר לקבוצה</a>
  <div style="margin-top:22px;font-size:0.95em; opacity:0.7;">
    *אנא לא לסגור דף זה לפני המעבר*
  </div>
</body>
</html>
